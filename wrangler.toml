name = "viewlify"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist/client"

# Cloudflare Pages configuration
[env.production]
name = "viewlify-production"

[env.production.vars]
NODE_VERSION = "20"

# D1 Database binding
[[env.production.d1_databases]]
binding = "DB"
database_name = "tiktok-analyzer-db"
database_id = "" # Will be filled after creating D1 database

# Environment variables (configure in Cloudflare dashboard)
# SIDECAR_TOKEN - Secret token for sidecar communication
# APP_URL - Your production URL
